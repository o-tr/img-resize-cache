name: CI (Kustomize)

on:
  pull_request:
    paths:
      - "kustomize/**"
      - ".github/workflows/ci-kustomize.yml"
  push:
    branches:
      - master
    paths:
      - "kustomize/**"
      - ".github/workflows/ci-kustomize.yml"

permissions:
  contents: read

jobs:
  kustomize:
    name: Kustomize (build + dry-run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.34.1

      - name: Set up kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Build kustomize/base
        run: |
          kubectl kustomize kustomize/base > /tmp/base.yaml
          kubeconform -summary -strict -ignore-missing-schemas -kubernetes-version 1.34.1 /tmp/base.yaml

      - name: Build kustomize/overlays/example
        run: |
          kubectl kustomize kustomize/overlays/example > /tmp/example.yaml
          kubeconform -summary -strict -ignore-missing-schemas -kubernetes-version 1.34.1 /tmp/example.yaml
