name: CI (Go)

on:
  pull_request:
    paths:
      - "authz/**"
      - ".github/workflows/ci-go.yml"
  push:
    branches:
      - master
    paths:
      - "authz/**"
      - ".github/workflows/ci-go.yml"

permissions:
  contents: read

jobs:
  go:
    name: Go (authz)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: authz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: authz/go.mod

      - name: gofmt (check)
        run: |
          test -z "$(gofmt -l .)"

      - name: go test
        run: |
          go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: authz
